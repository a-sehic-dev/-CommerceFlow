# Deploy on Render.com — public URL + optional PostgreSQL (Faza 2)
# Dashboard: New + Web Service → Connect repo → or use Manual settings on existing service

databases:
  - name: commerceflow-db
    plan: free
    databaseName: commerceflow
    user: commerceflow

services:
  - type: web
    name: commerceflow
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --prefer-binary -r requirements.txt && cd landing && npm ci && npm run build
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: commerceflow-db
          property: connectionString
