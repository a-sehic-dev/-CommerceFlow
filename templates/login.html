<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — CommerceFlow</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="app-body">
  <div class="ambient-bg" aria-hidden="true">
    <div class="ambient-orb ambient-orb-1"></div>
    <div class="ambient-orb ambient-orb-2"></div>
  </div>

  <main class="auth-shell">
    <a href="/" class="auth-back">← Back to site</a>
    <div class="auth-card">
      <div class="auth-brand">
        <p class="auth-brand-name">CommerceFlow</p>
        <p class="auth-brand-tag">Private operational workspace</p>
      </div>

      <div class="auth-tabs" role="tablist">
        <button type="button" class="auth-tab auth-tab-active" data-tab="login" role="tab">Sign in</button>
        <button type="button" class="auth-tab" data-tab="register" role="tab">Create account</button>
      </div>

      <form id="auth-login-form" class="auth-form">
        <label class="auth-label">Email
          <input class="auth-input" type="email" name="email" required autocomplete="email">
        </label>
        <label class="auth-label">Password
          <input class="auth-input" type="password" name="password" required autocomplete="current-password">
        </label>
        <p id="auth-login-error" class="auth-error hidden"></p>
        <button type="submit" class="btn-primary btn-primary-full">Sign in</button>
      </form>

      <form id="auth-register-form" class="auth-form hidden">
        <label class="auth-label">Company name
          <input class="auth-input" type="text" name="company_name" required autocomplete="organization">
        </label>
        <label class="auth-label">Your name
          <input class="auth-input" type="text" name="full_name" autocomplete="name">
        </label>
        <label class="auth-label">Work email
          <input class="auth-input" type="email" name="email" required autocomplete="email">
        </label>
        <label class="auth-label">Password (min 8 characters)
          <input class="auth-input" type="password" name="password" required minlength="8" autocomplete="new-password">
        </label>
        <p id="auth-register-error" class="auth-error hidden"></p>
        <button type="submit" class="btn-primary btn-primary-full">Create workspace</button>
      </form>

      <p class="auth-footnote">
        Guest demo still works without an account.
        <a href="/dashboard">Continue as guest →</a>
      </p>
    </div>
  </main>

  <script>
    const tabs = document.querySelectorAll('.auth-tab');
    const loginForm = document.getElementById('auth-login-form');
    const registerForm = document.getElementById('auth-register-form');
    const loginError = document.getElementById('auth-login-error');
    const registerError = document.getElementById('auth-register-error');

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        tabs.forEach((t) => t.classList.remove('auth-tab-active'));
        tab.classList.add('auth-tab-active');
        const isLogin = tab.dataset.tab === 'login';
        loginForm.classList.toggle('hidden', !isLogin);
        registerForm.classList.toggle('hidden', isLogin);
        loginError.classList.add('hidden');
        registerError.classList.add('hidden');
      });
    });

    function showError(el, message) {
      el.textContent = message;
      el.classList.remove('hidden');
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.classList.add('hidden');
      const data = Object.fromEntries(new FormData(loginForm));
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) return showError(loginError, body.detail || 'Sign in failed.');
      window.location.href = '/dashboard';
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      registerError.classList.add('hidden');
      const data = Object.fromEntries(new FormData(registerForm));
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok) return showError(registerError, body.detail || 'Registration failed.');
      window.location.href = '/dashboard';
    });
  </script>
</body>
</html>
